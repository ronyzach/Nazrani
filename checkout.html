<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<div id="app-chrome"></div>

<main id="main">
  <section class="page-head page-head-compact" aria-labelledby="page-title">
    <div class="container" id="page-head"></div>
  </section>
  <section class="cart-page">
    <div class="container">
      <div class="grid" id="ck-grid"></div>
    </div>
  </section>
</main>

<div id="app-footer"></div>

<script src="assets/data.js"></script>
<script src="assets/data-service.js"></script>
<script src="assets/app.js"></script>
<script>
(async function () {
  Nazrani.init({ active: '', pageId: 'checkout' });
  const C = DATA.copy.pages.checkout, ui = DATA.copy.ui;
  const esc = Nazrani.esc;

  document.getElementById('page-head').innerHTML = `
    <div class="crumbs"><a href="index.html">Home</a> · <a href="cart.html">Cart</a> · ${esc(C.crumbs)}</div>
    <h1 id="page-title">${esc(C.title)}</h1>`;

  const USER_KEY = 'nazrani:user:v1';
  const user = (() => { try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch(_) { return null; } })();
  if (!user) { location.href = 'login.html?next=checkout.html'; return; }

  const cart = await DataService.getHydratedCart();
  const grid = document.getElementById('ck-grid');

  if (!cart.items.length) {
    document.querySelector('.cart-page .container').innerHTML = `
      <div class="cart-empty">
        <div class="ico">${esc(ui.cartEmpty.icon)}</div>
        <h2>${esc(ui.cartEmpty.title)}</h2>
        <p>Add at least one item before checking out.</p>
        <a href="shop.html" class="btn btn-primary">${esc(ui.cartEmpty.cta)}</a>
      </div>`;
    return;
  }

  const payOpts = DATA.config.payment.methods.map(p => `
    <label class="payment-option">
      <input type="radio" name="payment" value="${p.id}"${p.id === DATA.config.payment.default ? ' checked' : ''}/>
      <div><div class="name">${esc(p.name)}</div><div class="sub">${esc(p.sub)}</div></div>
    </label>`).join('');

  const CL = DATA.copy.pages.login;
  const initial = (user.name || 'U').trim().charAt(0).toUpperCase();
  const provider = (user.provider || 'google');
  const providerLabel = provider.charAt(0).toUpperCase() + provider.slice(1);
  const authBannerHtml = user.guest
    ? `<div class="auth-banner">${esc(CL.bannerGuest)}<a href="login.html?next=checkout.html">${esc(CL.bannerSwitch)}</a></div>`
    : `<div class="auth-banner auth-banner-in">
        <div class="auth-avatar">${esc(initial)}</div>
        <div class="auth-text">
          <div class="auth-hello">Welcome back, <strong>${esc(user.name)}</strong></div>
          <div class="auth-sub">${esc(user.email)} · signed in via ${esc(providerLabel)}</div>
        </div>
        <a href="#" id="ck-signout" class="auth-signout">Sign out</a>
      </div>`;

  const req = '<span class="req" aria-hidden="true">*</span>';
  grid.innerHTML = `
    <form id="checkout-form" novalidate>
      ${authBannerHtml}
      <p class="req-legend">Fields marked <span class="req" aria-hidden="true">*</span> are required.</p>
      <div class="field-group">
        <h3>${esc(C.sections.contact)}</h3>
        <div class="form-grid">
          <div class="field full"><label for="ck-name">Full name ${req}</label><input id="ck-name" type="text" required aria-required="true" autocomplete="name" placeholder="Rony Zachariah"/></div>
          <div class="field c-7"><label for="ck-email">Email address ${req}</label><input id="ck-email" type="email" required aria-required="true" autocomplete="email" placeholder="rony@example.in"/></div>
          <div class="field c-5"><label for="ck-phone">Phone (10 digits) ${req}</label><input id="ck-phone" type="tel" required aria-required="true" pattern="[0-9]{10}" maxlength="10" autocomplete="tel" placeholder="9876543210"/></div>
        </div>
      </div>
      <div class="field-group">
        <h3>${esc(C.sections.address)}</h3>
        <div class="form-grid">
          <div class="field full"><label for="ck-line1">Address line 1 ${req}</label><input id="ck-line1" type="text" required aria-required="true" autocomplete="address-line1" placeholder="Door no., street"/></div>
          <div class="field c-8"><label for="ck-line2">Address line 2 <span class="opt">(optional)</span></label><input id="ck-line2" type="text" autocomplete="address-line2" placeholder="Apartment, landmark"/></div>
          <div class="field c-4"><label for="ck-pin">Pincode ${req}</label><input id="ck-pin" type="text" required aria-required="true" pattern="[0-9]{6}" maxlength="6" autocomplete="postal-code" placeholder="686001"/></div>
          <div class="field c-3"><label for="ck-village">Village <span class="opt">(optional)</span></label><input id="ck-village" type="text" autocomplete="address-level3" placeholder="Village or locality"/></div>
          <div class="field c-3"><label for="ck-city">Town / City ${req}</label><input id="ck-city" type="text" required aria-required="true" autocomplete="address-level2" placeholder="Auto-filled from pincode"/></div>
          <div class="field c-3"><label for="ck-state">State ${req}</label><input id="ck-state" type="text" required aria-required="true" autocomplete="address-level1" placeholder="Auto-filled from pincode"/></div>
          <div class="field c-3"><label for="ck-country">Country ${req}</label><input id="ck-country" type="text" required aria-required="true" autocomplete="country-name" value="India" readonly/></div>
        </div>
      </div>
      <div class="field-group">
        <h3>${esc(C.sections.payment)}</h3>
        <div class="payment-options">${payOpts}</div>
      </div>
      <div id="ck-error" role="alert" style="color:var(--error);font-size:12px;margin-top:14px;display:none;"></div>
    </form>
    <aside>
      <div class="summary-card" id="summary"></div>
    </aside>`;

  const summary = document.getElementById('summary');
  const lineRows = cart.items.map(it =>
    '<div class="row"><span>' + esc(it.name) + ' × ' + it.qty + '</span><span>' + Nazrani.rupee(it.lineTotal) + '</span></div>'
  ).join('');

  async function renderSummary(pincode) {
    const validPin = String(pincode || '').replace(/\D/g, '').length === 6;
    const c = await DataService.getHydratedCart(validPin ? pincode : '');
    const shipDisplay = !validPin
      ? '<span style="opacity:.7;">Enter pincode</span>'
      : (c.shipping === 0 ? 'Free' : Nazrani.rupee(c.shipping));
    const totalDisplay = validPin ? Nazrani.rupee(c.total) : Nazrani.rupee(c.subtotal);
    summary.innerHTML = `
      <h3>${esc(C.summaryTitle)}</h3>
      ${lineRows}
      <div class="row"><span>Subtotal</span><span>${Nazrani.rupee(c.subtotal)}</span></div>
      <div class="row"><span>Shipping</span><span>${shipDisplay}</span></div>
      <div class="row bold"><span>Total</span><span class="v">${totalDisplay}</span></div>
      <button class="checkout-btn" id="place-order" type="button">${esc(C.submitLabel)}</button>
      <div class="note">${esc(DATA.copy.pages.cart.taxNote)}<br/>${esc(C.dispatch)}</div>`;
    document.getElementById('place-order').addEventListener('click', placeOrder);
  }
  await renderSummary('');

  // Pre-fill all known fields from stored user record
  function setVal(id, val) { if (val) { const el = document.getElementById(id); if (el && !el.readOnly) el.value = val; } }
  if (!user.guest) {
    setVal('ck-name',  user.name);
    setVal('ck-email', user.email);
    setVal('ck-phone', user.phone);
  }
  if (user.address) {
    setVal('ck-line1',   user.address.line1);
    setVal('ck-line2',   user.address.line2);
    setVal('ck-pin',     user.address.pincode);
    setVal('ck-village', user.address.village);
    setVal('ck-city',    user.address.city);
    setVal('ck-state',   user.address.state);
    if (user.address.pincode) renderSummary(user.address.pincode);
  }

  // Sign-out
  const soLink = document.getElementById('ck-signout');
  if (soLink) soLink.addEventListener('click', function(e) {
    e.preventDefault();
    localStorage.removeItem(USER_KEY);
    location.href = 'login.html?next=checkout.html';
  });

  document.getElementById('ck-pin').addEventListener('input', (e) => {
    const v = (e.target.value || '').replace(/\D/g, '');
    e.target.value = v;
    if (v.length === 6) {
      renderSummary(v);
      // Auto-fill city + state from lookup table
      const lookup   = DATA.config.pincodeLookup   || {};
      const stateMap = DATA.config.pincodeStateMap  || {};
      const p3 = v.slice(0, 3);
      const p2 = v.slice(0, 2);
      const hit = lookup[p3];
      const cityEl  = document.getElementById('ck-city');
      const stateEl = document.getElementById('ck-state');
      if (hit) {
        if (!cityEl.value  || cityEl.dataset.auto === '1')  { cityEl.value  = hit.city;  cityEl.dataset.auto  = '1'; }
        if (!stateEl.value || stateEl.dataset.auto === '1') { stateEl.value = hit.state; stateEl.dataset.auto = '1'; }
      } else if (stateMap[p2]) {
        if (!stateEl.value || stateEl.dataset.auto === '1') { stateEl.value = stateMap[p2]; stateEl.dataset.auto = '1'; }
      }
    } else if (v.length === 0) {
      renderSummary('');
    }
  });

  // If user manually edits city/state, stop overwriting them
  ['ck-city', 'ck-state'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', function() {
      this.dataset.auto = '0';
    });
  });

  async function placeOrder() {
    const required = ['ck-email','ck-name','ck-phone','ck-line1','ck-city','ck-state','ck-pin'];
    const errBox = document.getElementById('ck-error');
    errBox.style.display = 'none';
    let firstMissing = null;
    for (const id of required) {
      const el = document.getElementById(id);
      if (!el.checkValidity()) { firstMissing = el; break; }
    }
    if (firstMissing) {
      errBox.textContent = C.errors.missing;
      errBox.style.display = '';
      firstMissing.focus();
      firstMissing.style.borderColor = 'var(--error)';
      return;
    }
    const btn = document.getElementById('place-order');
    btn.disabled = true; btn.textContent = 'Placing order...';
    const order = await DataService.placeOrder({
      customer: {
        name:  document.getElementById('ck-name').value,
        email: document.getElementById('ck-email').value,
        phone: document.getElementById('ck-phone').value
      },
      address: {
        line1:   document.getElementById('ck-line1').value,
        line2:   document.getElementById('ck-line2').value,
        village: document.getElementById('ck-village').value,
        city:    document.getElementById('ck-city').value,
        state:   document.getElementById('ck-state').value,
        pincode: document.getElementById('ck-pin').value,
        country: 'India'
      },
      payment: { method: (document.querySelector('input[name="payment"]:checked') || {}).value || DATA.config.payment.default }
    });
    location.href = 'order-confirmation.html?id=' + encodeURIComponent(order.orderId);
  }
})();
</script>
</body>
</html>
