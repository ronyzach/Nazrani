<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<div id="app-chrome"></div>

<main id="main">
  <section class="page-head" aria-labelledby="page-title">
    <div class="container" id="page-head"></div>
  </section>
  <section class="cart-page">
    <div class="container">
      <div class="grid" id="contact-grid"></div>
    </div>
  </section>
</main>

<div id="app-footer"></div>

<script src="assets/data.js"></script>
<script src="assets/data-service.js"></script>
<script src="assets/app.js"></script>
<script>
(function () {
  Nazrani.init({ active: 'contact', pageId: 'contact' });
  const C = DATA.copy.pages.contact;
  const B = DATA.brand;
  const esc = Nazrani.esc, tpl = Nazrani.tpl;

  document.getElementById('page-head').innerHTML = `
    <div class="crumbs"><a href="index.html">Home</a> · ${esc(C.crumbs)}</div>
    <h1 id="page-title">${esc(C.titleA)}<span class="accent">${esc(C.titleB)}</span></h1>
    <p class="lede">${esc(C.lede)}</p>`;

  const req = '<span class="req" aria-hidden="true">*</span>';
  document.getElementById('contact-grid').innerHTML = `
    <form id="contact-form" novalidate>
      <div class="field-group">
        <h3>${esc(C.formTitle)}</h3>
        <p class="req-legend">Fields marked <span class="req" aria-hidden="true">*</span> are required.</p>
        <div class="form-grid">
          <div class="field"><label for="cf-name">${esc(C.fields.name)} ${req}</label><input id="cf-name" type="text" required aria-required="true" autocomplete="name" placeholder="e.g. Maria Joseph"/></div>
          <div class="field"><label for="cf-email">${esc(C.fields.email)} ${req}</label><input id="cf-email" type="email" required aria-required="true" autocomplete="email" placeholder="you@example.in"/></div>
          <div class="field full">
            <label for="cf-subject">${esc(C.fields.subject)} ${req}</label>
            <select id="cf-subject" required aria-required="true">
              <option value="">${esc(C.fields.chooseTopic)}</option>
              ${C.fields.topics.map(t => '<option>' + esc(t) + '</option>').join('')}
            </select>
          </div>
          <div class="field full"><label for="cf-message">${esc(C.fields.message)} ${req}</label><textarea id="cf-message" required aria-required="true" placeholder="Tell us what you'd like to ask, share, or order. A person reads every message."></textarea></div>
        </div>
        <div id="cf-error" role="alert" style="color:var(--error);font-size:12px;margin-top:14px;display:none;"></div>
        <button type="submit" class="btn btn-primary" style="margin-top:24px;">${esc(C.submit)}</button>
      </div>
    </form>
    <aside>
      <div class="summary-card reach-card" style="position:static;">
        <h3>${esc(C.asideTitle)}</h3>
        <p class="reach-address">${C.asideAddress}</p>
        <div class="row"><span>Customer care</span><span><a href="mailto:${esc(B.contact.care)}">${esc(B.contact.care)}</a></span></div>
        <div class="row"><span>Phone</span><span><a href="tel:${esc((B.contact.phone||'').replace(/\s+/g,''))}">${esc(B.contact.phone)}</a></span></div>
        <div class="row"><span>FSSAI</span><span>${esc(B.contact.fssai)}</span></div>
        <div class="row"><span>GST</span><span>${esc(B.contact.gst)}</span></div>
        <div class="note">${C.asideNote}</div>
      </div>
    </aside>`;

  const form = document.getElementById('contact-form');
  const err  = document.getElementById('cf-error');
  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    err.style.display = 'none';
    const name = document.getElementById('cf-name').value.trim();
    const email = document.getElementById('cf-email').value.trim();
    const subject = document.getElementById('cf-subject').value;
    const message = document.getElementById('cf-message').value.trim();
    if (!name || !email || !subject || !message) {
      err.textContent = C.errors.missing; err.style.display = ''; return;
    }
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Sending...';
    const res = await DataService.sendContact({ name, email, subject, message });
    const firstName = (name.split(/\s+/)[0] || name).trim();
    form.innerHTML = `
      <div class="thanks-card" style="padding:24px 0;">
        <h2 style="font-family:var(--serif);font-weight:500;font-size:40px;color:var(--ink);margin:0 0 14px;line-height:1.1;letter-spacing:-0.01em;">${esc(tpl(C.thanks.titleTpl, { name: firstName }))}</h2>
        <p style="font-family:var(--serif);font-size:20px;color:var(--ink);margin:0 0 6px;line-height:1.45;">${esc(C.thanks.subtitle)}</p>
        <p style="font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-soft);margin:0 0 30px;line-height:1.5;">${esc(tpl(C.thanks.bodyTpl, { ref: res.ticketId }))}</p>
        <a href="index.html" class="btn btn-ghost">${esc(DATA.copy.ui.backToHome)}</a>
      </div>`;
  });
})();
</script>
</body>
</html>
