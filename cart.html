<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<div id="app-chrome"></div>

<main id="main">
  <section class="page-head page-head-compact" aria-labelledby="page-title">
    <div class="container" id="page-head"></div>
  </section>
  <section class="cart-page">
    <div class="container">
      <div id="cart-body" aria-live="polite"></div>
    </div>
  </section>
</main>

<div id="app-footer"></div>

<script src="assets/data.js"></script>
<script src="assets/illustrations.js"></script>
<script src="assets/data-service.js"></script>
<script src="assets/app.js"></script>
<script>
(async function () {
  Nazrani.init({ active: '', pageId: 'cart' });
  const C = DATA.copy.pages.cart, ui = DATA.copy.ui;
  const esc = Nazrani.esc;

  document.getElementById('page-head').innerHTML = `
    <div class="crumbs"><a href="index.html">Home</a> · ${esc(C.crumbs)}</div>
    <h1 id="page-title">${esc(C.titleA)}<span class="accent">${esc(C.titleB)}</span></h1>`;

  const body = document.getElementById('cart-body');

  async function render() {
    const cart = await DataService.getHydratedCart();
    if (!cart.items.length) {
      body.innerHTML = `
        <div class="cart-empty">
          <div class="ico">${esc(ui.cartEmpty.icon)}</div>
          <h2>${esc(ui.cartEmpty.title)}</h2>
          <p>${esc(ui.cartEmpty.body)}</p>
          <a href="shop.html" class="btn btn-primary">${esc(ui.cartEmpty.cta)}</a>
        </div>`;
      return;
    }

    const lines = cart.items.map(it => {
      const media = it.image
        ? '<img src="' + it.image + '" alt="' + esc(it.name) + '" loading="lazy"/>'
        : (typeof productIllustration === 'function' ? productIllustration(it.id) : '');
      const totalGrams = (it.weightGrams || 0) * it.qty;
      const totalWeight = totalGrams >= 1000
        ? (totalGrams / 1000).toFixed(totalGrams % 1000 === 0 ? 0 : 2) + ' kg'
        : totalGrams + ' g';
      const breakdown = `${Nazrani.rupee(it.unitPrice)} × ${it.qty} pack${it.qty === 1 ? '' : 's'}`
        + (it.weightGrams ? ` &middot; ${totalWeight} total` : '');
      return `<div class="cart-line" data-id="${it.id}">
        <a href="product.html?id=${it.id}" class="img" aria-label="View ${esc(it.name)}">${media}</a>
        <div>
          <div class="meta">${esc(it.category)} · ${esc(it.weight)}</div>
          <a href="product.html?id=${it.id}"><div class="name">${esc(it.name)}</div></a>
          <div class="sub">${esc(it.subtitle)} · ${esc(it.origin)}</div>
          <div class="actions">
            <div class="qty-stepper">
              <button data-step="-1" type="button" aria-label="Decrease quantity">−</button>
              <input type="number" value="${it.qty}" min="1" max="${DATA.config.cartLimit}" data-qty aria-label="Quantity"/>
              <button data-step="+1" type="button" aria-label="Increase quantity">+</button>
            </div>
            <button class="remove" data-remove type="button">Remove</button>
          </div>
        </div>
        <div class="amt">
          <div class="cart-breakdown">${breakdown}</div>
          ${Nazrani.rupee(it.lineTotal)}
        </div>
      </div>`;
    }).join('');

    body.innerHTML = `
      <div class="grid">
        <div>
          <div class="eyebrow" style="margin-bottom:8px;">${cart.items.length} ITEM${cart.items.length === 1 ? '' : 'S'}</div>
          ${lines}
          <a href="shop.html" class="more" style="display:inline-block;margin-top:24px;">← Continue shopping</a>
        </div>
        <aside>
          <div class="summary-card">
            <h3>${esc(C.summaryTitle)}</h3>
            ${cart.items.map(it => `
              <div class="row" style="align-items:flex-start;">
                <span style="flex:1;padding-right:12px;">
                  <span style="display:block;">${esc(it.name)}</span>
                  <span style="display:block;font-size:12px;color:var(--ink-muted);margin-top:2px;">${Nazrani.rupee(it.unitPrice)} × ${it.qty}</span>
                </span>
                <span>${Nazrani.rupee(it.lineTotal)}</span>
              </div>`).join('')}
            <div class="row subtotal"><span>Subtotal</span><span class="v">${Nazrani.rupee(cart.subtotal)}</span></div>
            <div class="row shipping"><span>Shipping</span><span style="opacity:.7;">Calculated at checkout</span></div>
            <div class="row bold"><span>Total</span><span class="v">${Nazrani.rupee(cart.subtotal)}</span></div>
            <button class="checkout-btn" id="cart-checkout-btn" type="button">${esc(C.checkoutLabel)}</button>
            <div class="note">${esc(C.taxNote)}</div>
          </div>
        </aside>
      </div>`;

    body.querySelectorAll('.cart-line').forEach(line => {
      const id   = line.dataset.id;
      const qtyI = line.querySelector('[data-qty]');
      line.querySelectorAll('[data-step]').forEach(b => {
        b.addEventListener('click', () => {
          const step = parseInt(b.dataset.step, 10);
          const next = Math.max(1, Math.min(DATA.config.cartLimit, parseInt(qtyI.value, 10) + step));
          qtyI.value = next;
          DataService.updateCartQty(id, next);
          render();
        });
      });
      qtyI.addEventListener('change', () => {
        const v = Math.max(1, Math.min(DATA.config.cartLimit, parseInt(qtyI.value, 10) || 1));
        DataService.updateCartQty(id, v);
        render();
      });
      line.querySelector('[data-remove]').addEventListener('click', () => {
        DataService.removeFromCart(id);
        Nazrani.showToast(ui.toast.removed, { action: false });
        render();
      });
    });

    document.getElementById('cart-checkout-btn').addEventListener('click', function () {
      const user = (() => { try { return JSON.parse(localStorage.getItem('nazrani:user:v1')); } catch(_) { return null; } })();
      if (user) location.href = 'checkout.html';
      else       location.href = 'login.html?next=checkout.html';
    });
  }
  render();
})();
</script>
</body>
</html>
