<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Products · Nazrani Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/admin.css"/>
<style>
.product-drawer {
  position:fixed; top:0; right:0; bottom:0; width:520px;
  background:#fff; border-left:1px solid var(--border);
  box-shadow:-4px 0 24px rgba(0,0,0,0.10);
  display:flex; flex-direction:column; z-index:200;
  transform:translateX(100%); transition:transform 240ms ease;
}
.product-drawer.open { transform:translateX(0); }
.drawer-header { padding:16px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.drawer-body   { flex:1; overflow-y:auto; padding:22px; }
.drawer-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.25); z-index:199; display:none; }
.overlay.show { display:block; }
</style>
</head>
<body>
<div class="admin-wrap">
  <div id="admin-sidebar"></div>
  <main class="admin-main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="breadcrumb">Nazrani Heritage</div>
        <h1>Products</h1>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="add-btn">+ Add Product</button>
      </div>
    </div>
    <div class="page-body" style="padding:0;">
      <div class="card" style="border-radius:0;border-left:0;border-right:0;border-top:0;">
        <div class="filter-bar">
          <div class="search-box">
            <span style="color:var(--ink-muted);font-size:14px;">⌕</span>
            <input id="search" type="text" placeholder="Search products…"/>
          </div>
          <select class="filter-select" id="cat-filter">
            <option value="">All Categories</option>
          </select>
          <span class="result-count" id="result-count"></span>
        </div>
        <div style="overflow-x:auto;">
          <table class="data-table" id="products-table">
            <thead><tr>
              <th data-col="name">Product <span class="si">↕</span></th>
              <th data-col="category">Category <span class="si">↕</span></th>
              <th data-col="origin">Origin <span class="si">↕</span></th>
              <th data-col="price">Price <span class="si">↕</span></th>
              <th data-col="stock">Stock <span class="si">↕</span></th>
              <th data-col="source">Source <span class="si">↕</span></th>
              <th data-col="visible">Visible <span class="si">↕</span></th>
              <th></th>
            </tr></thead>
            <tbody id="products-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="overlay" id="overlay"></div>
<div class="product-drawer" id="product-drawer">
  <div class="drawer-header">
    <h2 id="drawer-title">Add Product</h2>
    <button class="btn btn-ghost btn-sm" id="drawer-close">✕</button>
  </div>
  <div class="drawer-body">
    <div class="form-grid" style="gap:14px;">
      <div class="form-group">
        <label>Product Name <span class="required">*</span></label>
        <input id="f-name" type="text" placeholder="e.g. Tellicherry Black Pepper"/>
      </div>
      <div class="form-group">
        <label>Subtitle</label>
        <input id="f-subtitle" type="text" placeholder="e.g. Whole, sun-dried"/>
      </div>
      <div class="form-group">
        <label>Category <span class="required">*</span></label>
        <select id="f-category">
          <option>Spices</option><option>Staples</option>
          <option>Ayurveda</option><option>Health Foods</option>
        </select>
      </div>
      <div class="form-group">
        <label>Origin</label>
        <input id="f-origin" type="text" placeholder="e.g. Wayanad"/>
      </div>
      <div class="form-group">
        <label>Price (₹) <span class="required">*</span></label>
        <input id="f-price" type="number" min="0" placeholder="0"/>
      </div>
      <div class="form-group">
        <label>Weight</label>
        <input id="f-weight" type="text" placeholder="e.g. 250g"/>
      </div>
      <div class="form-group">
        <label>Lot Number</label>
        <input id="f-lot" type="text" placeholder="e.g. WYD-PPR-26-04"/>
      </div>
      <div class="form-group">
        <label>Harvest Year</label>
        <input id="f-harvested" type="text" placeholder="e.g. 2025"/>
      </div>
      <div class="form-group">
        <label>Sourced From</label>
        <input id="f-sourced" type="text" placeholder="e.g. Vanamoolika"/>
      </div>
      <div class="form-group">
        <label>GI Tagged</label>
        <select id="f-gi"><option value="false">No</option><option value="true">Yes</option></select>
      </div>
      <div class="form-group full">
        <label>Product Story</label>
        <textarea id="f-story" placeholder="Brief description of origin, processing, taste…"></textarea>
      </div>
      <div class="form-group full">
        <label>Tasting / Use Notes (one per line)</label>
        <textarea id="f-notes" rows="3" placeholder="Warm, pungent heat&#10;Ideal for marinades&#10;…"></textarea>
      </div>
      <div class="form-group full">
        <label>Image URL</label>
        <input id="f-image" type="text" placeholder="https://… or leave blank"/>
      </div>
      <div class="form-group">
        <label>Visible on Store</label>
        <select id="f-visible"><option value="true">Yes</option><option value="false">No (hidden)</option></select>
      </div>
    </div>
    <div id="drawer-error" style="color:var(--red);font-size:12px;margin-top:12px;display:none;"></div>
  </div>
  <div class="drawer-footer">
    <button class="btn btn-ghost" id="drawer-cancel">Cancel</button>
    <button class="btn btn-primary" id="drawer-save">Save Product</button>
  </div>
</div>

<script src="../assets/data.js"></script>
<script src="../assets/data-service.js"></script>
<script src="assets/admin.js"></script>
<script>
Admin.requireAuth();
Admin.renderSidebar('products');

const PROD_KEY = 'nazrani:products:v1';
const esc = Admin.esc, rupee = Admin.rupee;

// Merge DATA.products with any admin-added products
function getProducts() {
  try {
    const extras = JSON.parse(localStorage.getItem(PROD_KEY)||'[]');
    const base = (window.DATA.products||[]).map(function(p){ return Object.assign({},p,{_source:'data'}); });
    return extras.concat(base);
  } catch(_){ return window.DATA.products||[]; }
}
function saveExtra(list) { localStorage.setItem(PROD_KEY, JSON.stringify(list)); }
function getExtras() { try{ return JSON.parse(localStorage.getItem(PROD_KEY)||'[]'); }catch(_){ return []; } }

// Categories for filter
const cats = [...new Set((window.DATA.products||[]).map(function(p){ return p.category; }))];
document.getElementById('cat-filter').innerHTML = '<option value="">All Categories</option>'
  + cats.map(function(c){ return '<option>' + esc(c) + '</option>'; }).join('');

let editingId = null;
let sortCol = 'name', sortDir = 1;

function render() {
  const q   = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const inv = Admin.getInventory();
  const all = getProducts();
  let list = all.filter(function(p){
    return (!q || p.name.toLowerCase().includes(q) || (p.origin||'').toLowerCase().includes(q))
      && (!cat || p.category===cat);
  });

  list.sort(function(a, b){
    var stockA = inv[a.id]!==undefined ? inv[a.id] : (a._source==='data'?50:0);
    var stockB = inv[b.id]!==undefined ? inv[b.id] : (b._source==='data'?50:0);
    if (sortCol==='name')     return sortDir*(a.name||'').localeCompare(b.name||'');
    if (sortCol==='category') return sortDir*(a.category||'').localeCompare(b.category||'');
    if (sortCol==='origin')   return sortDir*(a.origin||'').localeCompare(b.origin||'');
    if (sortCol==='price')    return sortDir*(a.price-b.price);
    if (sortCol==='stock')    return sortDir*(stockA-stockB);
    if (sortCol==='source')   return sortDir*(a.sourcedFrom||'').localeCompare(b.sourcedFrom||'');
    if (sortCol==='visible')  return sortDir*(Number(!!a.hidden)-Number(!!b.hidden));
    return 0;
  });

  document.getElementById('result-count').textContent = list.length + ' products';

  document.querySelectorAll('th[data-col]').forEach(function(th){
    th.classList.toggle('sorted', th.dataset.col===sortCol);
    var si = th.querySelector('.si');
    if (si) si.textContent = th.dataset.col===sortCol ? (sortDir===1?'↑':'↓') : '↕';
  });

  document.getElementById('products-body').innerHTML = list.map(function(p){
    const stock = inv[p.id]!==undefined ? inv[p.id] : (p._source==='data'?50:0);
    const hidden = p.hidden ? '<span class="badge badge-muted">Hidden</span>' : '<span class="badge badge-green">Live</span>';
    const kid = 'km-' + p.id.replace(/[^a-z0-9]/gi,'');
    return '<tr>'
      + '<td><div class="td-primary">' + esc(p.name) + '</div><div style="font-size:11px;color:var(--ink-muted);">' + esc(p.subtitle||'') + '</div></td>'
      + '<td><span class="tag">' + esc(p.category) + '</span></td>'
      + '<td>' + esc(p.origin||'—') + '</td>'
      + '<td class="td-amt">' + rupee(p.price) + '</td>'
      + '<td>' + Admin.stockBadge(stock) + '</td>'
      + '<td style="font-size:12px;color:var(--ink-soft);">' + esc(p.sourcedFrom||'—') + '</td>'
      + '<td>' + hidden + '</td>'
      + '<td class="td-actions">'
      +   '<div class="kebab-wrap">'
      +     '<button class="kebab-btn" data-kebab="' + kid + '">⋮</button>'
      +     '<div class="kebab-menu" id="' + kid + '">'
      +       '<button data-edit="' + esc(p.id) + '">✎ Edit Product</button>'
      +       '<a href="../product.html?id=' + esc(p.id) + '" target="_blank" style="display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:13px;color:var(--ink-soft);text-decoration:none;border-top:1px solid var(--border);">↗ View on Store</a>'
      +     '</div>'
      +   '</div>'
      + '</td>'
      + '</tr>';
  }).join('') || '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--ink-muted);">No products found</td></tr>';

  document.querySelectorAll('[data-edit]').forEach(function(btn){
    btn.addEventListener('click', function(){ openDrawer(btn.dataset.edit); });
  });
  document.querySelectorAll('.kebab-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      const menu = document.getElementById(btn.dataset.kebab);
      const isOpen = menu.classList.contains('open');
      document.querySelectorAll('.kebab-menu.open').forEach(function(m){ m.classList.remove('open'); });
      if (!isOpen) menu.classList.add('open');
    });
  });
}

function openDrawer(id) {
  editingId = id || null;
  document.getElementById('drawer-title').textContent = id ? 'Edit Product' : 'Add Product';
  document.getElementById('drawer-error').style.display = 'none';

  const p = id ? getProducts().find(function(x){ return x.id===id; }) : null;
  document.getElementById('f-name').value     = p ? p.name : '';
  document.getElementById('f-subtitle').value = p ? (p.subtitle||'') : '';
  document.getElementById('f-category').value = p ? p.category : 'Spices';
  document.getElementById('f-origin').value   = p ? (p.origin||'') : '';
  document.getElementById('f-price').value    = p ? p.price : '';
  document.getElementById('f-weight').value   = p ? (p.weight||'') : '';
  document.getElementById('f-lot').value      = p ? (p.lot||'') : '';
  document.getElementById('f-harvested').value= p ? (p.harvested||'') : '';
  document.getElementById('f-sourced').value  = p ? (p.sourcedFrom||'') : '';
  document.getElementById('f-gi').value       = p ? String(!!p.gi) : 'false';
  document.getElementById('f-story').value    = p ? (p.story||'') : '';
  document.getElementById('f-notes').value    = p ? (p.notes||[]).join('\n') : '';
  document.getElementById('f-image').value    = p ? (p.image||'') : '';
  document.getElementById('f-visible').value  = p ? String(!p.hidden) : 'true';

  document.getElementById('product-drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeDrawer() {
  editingId = null;
  document.getElementById('product-drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('drawer-save').addEventListener('click', function(){
  const name = document.getElementById('f-name').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const err = document.getElementById('drawer-error');
  if (!name) { err.textContent='Product name is required.'; err.style.display='block'; return; }
  if (!price || price<=0) { err.textContent='Enter a valid price.'; err.style.display='block'; return; }
  err.style.display='none';

  const extras = getExtras();
  const isNew  = !editingId || !extras.find(function(x){ return x.id===editingId; });
  const id     = editingId || ('x-' + Date.now().toString(36));

  const product = {
    id: id,
    name:       name,
    subtitle:   document.getElementById('f-subtitle').value.trim(),
    category:   document.getElementById('f-category').value,
    origin:     document.getElementById('f-origin').value.trim(),
    price:      price,
    weight:     document.getElementById('f-weight').value.trim(),
    lot:        document.getElementById('f-lot').value.trim(),
    harvested:  document.getElementById('f-harvested').value.trim(),
    sourcedFrom:document.getElementById('f-sourced').value.trim(),
    gi:         document.getElementById('f-gi').value === 'true',
    story:      document.getElementById('f-story').value.trim(),
    notes:      document.getElementById('f-notes').value.split('\n').map(function(s){ return s.trim(); }).filter(Boolean),
    image:      document.getElementById('f-image').value.trim() || null,
    hidden:     document.getElementById('f-visible').value !== 'true',
  };

  if (isNew) extras.unshift(product);
  else { const idx = extras.findIndex(function(x){ return x.id===id; }); if(idx>-1) extras[idx]=product; }
  saveExtra(extras);
  closeDrawer();
  render();
});

document.getElementById('add-btn').addEventListener('click', function(){ openDrawer(null); });
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-cancel').addEventListener('click', closeDrawer);
document.getElementById('overlay').addEventListener('click', closeDrawer);
document.getElementById('search').addEventListener('input', render);
document.getElementById('cat-filter').addEventListener('change', render);

document.querySelectorAll('th[data-col]').forEach(function(th){
  th.addEventListener('click', function(){
    if (sortCol===th.dataset.col) sortDir*=-1;
    else { sortCol=th.dataset.col; sortDir=1; }
    render();
  });
});

document.addEventListener('click', function(e){
  if (!e.target.closest('.kebab-wrap')) {
    document.querySelectorAll('.kebab-menu.open').forEach(function(m){ m.classList.remove('open'); });
  }
});

render();
</script>
</body>
</html>
