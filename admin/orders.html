<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Orders · Nazrani Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/admin.css"/>
<style>
.order-detail-panel {
  position:fixed; top:0; right:0; bottom:0; width:460px;
  background:#fff; border-left:1px solid var(--border);
  box-shadow:-4px 0 24px rgba(0,0,0,0.10);
  display:flex; flex-direction:column; z-index:200;
  transform:translateX(100%); transition:transform 240ms ease;
}
.order-detail-panel.open { transform:translateX(0); }
.odp-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.odp-header h2 { font-size:15px; font-weight:600; }
.odp-body { flex:1; overflow-y:auto; padding:22px; }
.odp-section { margin-bottom:22px; }
.odp-section .sec-title { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:10px; }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.25); z-index:199; display:none; }
.overlay.show { display:block; }
</style>
</head>
<body>
<div class="admin-wrap">
  <div id="admin-sidebar"></div>
  <main class="admin-main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="breadcrumb">Nazrani Heritage</div>
        <h1>Orders</h1>
      </div>
      <div class="topbar-actions">
        <span id="order-count" style="font-size:12px;color:var(--ink-muted);"></span>
      </div>
    </div>
    <div class="page-body" style="padding:0;">
      <div class="card" style="border-radius:0;border-left:0;border-right:0;border-top:0;">
        <div class="filter-bar">
          <div class="search-box">
            <span style="color:var(--ink-muted);font-size:14px;">⌕</span>
            <input id="search" type="text" placeholder="Search order ID, customer, product…"/>
          </div>
          <select class="filter-select" id="status-filter">
            <option value="">All Statuses</option>
            <option>YET TO SHIP</option>
            <option>IN TRANSIT</option>
            <option>DELIVERED</option>
            <option>CANCELLED</option>
            <option value="__ISSUES__">⚠ With Issues</option>
          </select>
          <span class="result-count" id="result-count"></span>
        </div>
        <div style="overflow-x:auto;">
          <table class="data-table" id="orders-table">
            <thead>
              <tr>
                <th data-col="date">Date <span class="si">↕</span></th>
                <th data-col="id">Order ID</th>
                <th>Customer</th>
                <th>Items</th>
                <th data-col="amount">Amount <span class="si">↕</span></th>
                <th data-col="status">Status <span class="si">↕</span></th>
                <th>AWB</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Detail panel -->
<div class="overlay" id="overlay"></div>
<div class="order-detail-panel" id="detail-panel">
  <div class="odp-header">
    <h2 id="odp-title">Order Detail</h2>
    <div style="display:flex;gap:8px;">
      <select id="odp-status" class="filter-select" style="font-size:12px;padding:5px 28px 5px 8px;"></select>
      <button class="btn btn-ghost btn-sm" id="odp-close">✕</button>
    </div>
  </div>
  <div class="odp-body" id="odp-body"></div>
</div>

<script src="../assets/data.js"></script>
<script src="../assets/data-service.js"></script>
<script src="assets/admin.js"></script>
<script>
Admin.requireAuth();
Admin.renderSidebar('orders');

const ORDERS_KEY = 'nazrani:orders:v1';
const esc = Admin.esc, rupee = Admin.rupee, fmtDate = Admin.fmtDate;
const STATUSES = ['YET TO SHIP','IN TRANSIT','DELIVERED','CANCELLED'];

function readOrders() {
  try { return JSON.parse(localStorage.getItem(ORDERS_KEY)||'[]'); } catch(_){ return []; }
}
function writeOrders(list) { localStorage.setItem(ORDERS_KEY, JSON.stringify(list)); }

let allOrders = readOrders();
let sortCol = 'date', sortDir = -1;
let activeId = null;

// Populate status select in panel
document.getElementById('odp-status').innerHTML = STATUSES.map(function(s){
  return '<option>' + s + '</option>';
}).join('');

function filtered() {
  const q      = document.getElementById('search').value.toLowerCase().trim();
  const status = document.getElementById('status-filter').value;
  return allOrders.filter(function(o){
    const matchQ = !q ||
      (o.orderId||'').toLowerCase().includes(q) ||
      ((o.customer&&o.customer.name)||'').toLowerCase().includes(q) ||
      ((o.customer&&o.customer.email)||'').toLowerCase().includes(q) ||
      (o.items||[]).some(function(i){ return i.name.toLowerCase().includes(q); });
    const matchS = !status
      || (status === '__ISSUES__' && !!o.issue)
      || (status !== '__ISSUES__' && (o.status||'CONFIRMED') === status);
    return matchQ && matchS;
  });
}

function sorted(list) {
  return list.slice().sort(function(a,b){
    if (sortCol==='date')   return sortDir*(new Date(a.placed)-new Date(b.placed));
    if (sortCol==='amount') return sortDir*(a.total-b.total);
    if (sortCol==='status') return sortDir*(a.status||'').localeCompare(b.status||'');
    return 0;
  });
}

function render() {
  allOrders = readOrders();
  const list = sorted(filtered());
  document.getElementById('order-count').textContent = allOrders.length + ' total orders';
  document.getElementById('result-count').textContent = 'Showing ' + list.length + ' of ' + allOrders.length;

  document.querySelectorAll('th[data-col]').forEach(function(th){
    th.classList.toggle('sorted', th.dataset.col === sortCol);
    const si = th.querySelector('.si');
    if (si && th.dataset.col === sortCol) si.textContent = sortDir===-1?'↓':'↑';
    else if (si) si.textContent = '↕';
  });

  const tbody = document.getElementById('orders-body');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--ink-muted);">No orders found</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(o){
    const items = (o.items||[]).slice(0,2).map(function(i){ return i.name+' ×'+i.qty; }).join(', ')
      + ((o.items||[]).length>2 ? ' +'+((o.items||[]).length-2)+' more' : '');
    const rowStyle = o.issue ? 'cursor:pointer;background:#fff8f8;' : 'cursor:pointer;';
    return '<tr style="' + rowStyle + '" data-id="' + esc(o.orderId) + '">'
      + '<td class="td-mono">' + fmtDate(o.placed) + '</td>'
      + '<td class="td-primary td-mono">' + esc(o.orderId) + '</td>'
      + '<td>' + esc((o.customer&&o.customer.name)||'—') + '<div style="font-size:11px;color:var(--ink-muted);">' + esc((o.customer&&o.customer.email)||'') + '</div></td>'
      + '<td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(items) + '</td>'
      + '<td class="td-amt">' + rupee(o.total) + '</td>'
      + '<td>' + Admin.statusBadge(o.status||'CONFIRMED') + (o.issue ? ' ' + Admin.issueBadge(o.issueType) : '') + '</td>'
      + '<td class="td-mono" style="font-size:11px;">' + esc(o.airwayBillNo||'—') + '</td>'
      + '<td class="td-actions"><div class="kebab-wrap"><button class="kebab-btn" data-kebab="km-' + esc(o.orderId) + '">⋮</button><div class="kebab-menu" id="km-' + esc(o.orderId) + '"><button data-open="' + esc(o.orderId) + '">◧ View Order</button><a href="invoices.html?id=' + esc(o.orderId) + '" class="btn" style="display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:13px;color:var(--ink-soft);text-decoration:none;border-top:1px solid var(--border);">◈ Generate Invoice</a></div></div></td>'
      + '</tr>';
  }).join('');

  tbody.querySelectorAll('tr').forEach(function(tr){
    tr.addEventListener('click', function(e){
      if (e.target.closest('button') || e.target.closest('a')) return;
      openPanel(tr.dataset.id);
    });
    const btn = tr.querySelector('[data-open]');
    if (btn) btn.addEventListener('click', function(){ openPanel(btn.dataset.open); });
  });

  tbody.querySelectorAll('.kebab-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      const menu = document.getElementById(btn.dataset.kebab);
      const isOpen = menu.classList.contains('open');
      document.querySelectorAll('.kebab-menu.open').forEach(function(m){ m.classList.remove('open'); });
      if (!isOpen) menu.classList.add('open');
    });
  });
}

function openPanel(id) {
  const o = allOrders.find(function(x){ return x.orderId===id; });
  if (!o) return;
  activeId = id;
  document.getElementById('odp-title').textContent = o.orderId;
  document.getElementById('odp-status').value = o.status || 'YET TO SHIP';

  const addr = o.address || {};
  const cust = o.customer || {};
  const lines = (o.items||[]).map(function(it){
    return '<tr><td>' + esc(it.name) + ' <span style="color:var(--ink-muted);">×' + it.qty + '</span></td>'
      + '<td style="text-align:right;">' + rupee(it.lineTotal) + '</td></tr>';
  }).join('');

  document.getElementById('odp-body').innerHTML =
    '<div class="odp-section"><div class="sec-title">Customer</div>'
    + '<div class="kv-list">'
    + '<div class="kv-row"><span class="k">Name</span><span class="v">' + esc(cust.name||'—') + '</span></div>'
    + '<div class="kv-row"><span class="k">Email</span><span class="v">' + esc(cust.email||'—') + '</span></div>'
    + '<div class="kv-row"><span class="k">Phone</span><span class="v">' + esc(cust.phone||'—') + '</span></div>'
    + '</div></div>'
    + '<div class="odp-section"><div class="sec-title">Ship to</div>'
    + '<div style="font-size:13px;color:var(--ink-soft);line-height:1.7;">'
    + esc(addr.line1||'') + '<br>' + esc(addr.city||'') + ', ' + esc(addr.state||'') + ' – ' + esc(addr.pincode||'') + '</div></div>'
    + '<div class="odp-section"><div class="sec-title">Items</div>'
    + '<table style="width:100%;font-size:13px;">' + lines + '</table>'
    + '<div class="divider"></div>'
    + '<div class="kv-list">'
    + '<div class="kv-row"><span class="k">Subtotal</span><span class="v">' + rupee(o.subtotal) + '</span></div>'
    + '<div class="kv-row"><span class="k">Shipping</span><span class="v">' + (o.shipping===0?'Free':rupee(o.shipping)) + '</span></div>'
    + '<div class="kv-row" style="font-weight:700;font-size:14px;"><span class="k">Total</span><span class="v">' + rupee(o.total) + '</span></div>'
    + '</div></div>'
    + '<div class="odp-section" id="shipment-section">' + buildShipmentSection(o) + '</div>'
    + '<div class="odp-section" id="issue-section">' + buildIssueSection(o) + '</div>'
    + '<div style="display:flex;gap:10px;flex-wrap:wrap;">'
    + '<a href="invoices.html?id=' + esc(o.orderId) + '" class="btn btn-outline btn-sm">Generate invoice</a>'
    + '<a href="../order-confirmation.html?id=' + esc(o.orderId) + '" target="_blank" class="btn btn-ghost btn-sm">Customer view ↗</a>'
    + '</div>';

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  attachShipmentHandlers(o);
  attachIssueHandlers();
}

function buildIssueSection(o) {
  const typeOpts = Object.entries(Admin.ISSUE_TYPES).map(function(e){
    return '<option value="' + e[0] + '">' + e[1] + '</option>';
  }).join('');

  if (o.issue) {
    return '<div class="sec-title" style="color:var(--red);">Active Issue</div>'
      + '<div style="margin-bottom:10px;">' + Admin.issueBadge(o.issueType) + '</div>'
      + (o.issueNotes ? '<div style="font-size:12px;color:var(--ink-soft);background:#fff8f8;border:1px solid #ffd5d5;border-radius:5px;padding:10px 12px;line-height:1.6;margin-bottom:12px;">' + esc(o.issueNotes) + '</div>' : '')
      + '<button class="btn btn-outline btn-sm" id="resolve-btn" style="border-color:var(--green);color:var(--green);">✓ Mark Resolved</button>';
  }

  return '<div class="sec-title">Issues</div>'
    + '<div style="font-size:13px;color:var(--green);margin-bottom:10px;">✓ No active issues</div>'
    + '<button class="btn btn-ghost btn-sm" id="flag-open-btn">⚠ Flag an Issue</button>'
    + '<div id="flag-form" style="display:none;margin-top:14px;">'
    + '<div class="form-group" style="margin-bottom:10px;">'
    + '<label style="font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;">Issue Type</label>'
    + '<select id="issue-type-sel" style="margin-top:4px;width:100%;">' + typeOpts + '</select>'
    + '</div>'
    + '<div class="form-group" style="margin-bottom:12px;">'
    + '<label style="font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;">Notes</label>'
    + '<textarea id="issue-notes-inp" rows="3" style="margin-top:4px;width:100%;font-size:13px;resize:vertical;" placeholder="Describe the issue…"></textarea>'
    + '</div>'
    + '<div style="display:flex;gap:8px;">'
    + '<button class="btn btn-primary btn-sm" id="flag-confirm-btn">Flag as Issue</button>'
    + '<button class="btn btn-ghost btn-sm" id="flag-cancel-btn">Cancel</button>'
    + '</div></div>';
}

function attachIssueHandlers() {
  const flagOpen = document.getElementById('flag-open-btn');
  if (flagOpen) {
    flagOpen.addEventListener('click', function(){
      document.getElementById('flag-form').style.display = 'block';
      flagOpen.style.display = 'none';
    });
  }
  const flagCancel = document.getElementById('flag-cancel-btn');
  if (flagCancel) {
    flagCancel.addEventListener('click', function(){
      document.getElementById('flag-form').style.display = 'none';
      document.getElementById('flag-open-btn').style.display = '';
    });
  }
  const flagConfirm = document.getElementById('flag-confirm-btn');
  if (flagConfirm) {
    flagConfirm.addEventListener('click', function(){
      if (!activeId) return;
      const orders = readOrders();
      const o = orders.find(function(x){ return x.orderId===activeId; });
      if (!o) return;
      o.issue      = true;
      o.issueType  = document.getElementById('issue-type-sel').value;
      o.issueNotes = document.getElementById('issue-notes-inp').value.trim();
      writeOrders(orders);
      allOrders = orders;
      document.getElementById('issue-section').innerHTML = buildIssueSection(o);
      attachIssueHandlers();
      render();
    });
  }
  const resolveBtn = document.getElementById('resolve-btn');
  if (resolveBtn) {
    resolveBtn.addEventListener('click', function(){
      if (!activeId) return;
      const orders = readOrders();
      const o = orders.find(function(x){ return x.orderId===activeId; });
      if (!o) return;
      delete o.issue; delete o.issueType; delete o.issueNotes;
      writeOrders(orders);
      allOrders = orders;
      document.getElementById('issue-section').innerHTML = buildIssueSection(o);
      attachIssueHandlers();
      render();
    });
  }
}

const COURIERS = ['IndiaShipments','Delhivery','DTDC','BlueDart','Ekart','Xpressbees','India Post','Shadowfax','Ecom Express','Other'];

function buildShipmentSection(o) {
  const payMethod = esc(((o.payment && o.payment.method) || '').toUpperCase() || '—');
  let html = '<div class="sec-title">Shipment</div>'
    + '<div class="kv-list" style="margin-bottom:14px;">'
    + '<div class="kv-row"><span class="k">Payment</span><span class="v">' + payMethod + '</span></div>'
    + '<div class="kv-row"><span class="k">Order date</span><span class="v">' + fmtDate(o.placed) + '</span></div>'
    + '</div>';

  if (o.courier || o.airwayBillNo) {
    html += '<div style="background:var(--green-light);border:1px solid #a8d5b5;border-radius:6px;padding:12px 14px;margin-bottom:12px;">'
      + '<div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--green);font-weight:600;margin-bottom:8px;">Tracking Info</div>'
      + '<div class="kv-list">'
      + '<div class="kv-row"><span class="k">Courier</span><span class="v">' + esc(o.courier || '—') + '</span></div>'
      + '<div class="kv-row"><span class="k">AWB</span><span class="v" style="font-family:var(--mono);font-size:12px;letter-spacing:.04em;">' + esc(o.airwayBillNo || '—') + '</span></div>'
      + (o.estimatedDelivery ? '<div class="kv-row"><span class="k">Est. delivery</span><span class="v">' + fmtDate(o.estimatedDelivery) + '</span></div>' : '')
      + '</div></div>'
      + '<div id="trk-form-wrap" style="display:none;">' + buildTrackingForm(o) + '</div>'
      + '<button class="btn btn-ghost btn-sm" id="edit-tracking-btn">✎ Edit Tracking</button>';
  } else {
    html += '<div style="font-size:12px;color:var(--ink-muted);margin-bottom:12px;">No tracking info added yet.</div>'
      + '<div id="trk-form-wrap">' + buildTrackingForm(o) + '</div>';
  }
  return html;
}

function buildTrackingForm(o) {
  const courierOpts = COURIERS.map(function(c){
    return '<option value="' + c + '"' + (o.courier === c ? ' selected' : '') + '>' + c + '</option>';
  }).join('');
  return '<div class="form-group" style="margin-bottom:10px;">'
    + '<label style="font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.08em;">Courier</label>'
    + '<select id="trk-courier" style="margin-top:4px;width:100%;">' + courierOpts + '</select>'
    + '</div>'
    + '<div class="form-group" style="margin-bottom:10px;">'
    + '<label style="font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.08em;">AWB / Tracking Number</label>'
    + '<input id="trk-awb" type="text" value="' + esc(o.airwayBillNo || '') + '" placeholder="e.g. DEL1234567890" style="margin-top:4px;font-family:var(--mono);letter-spacing:.04em;"/>'
    + '</div>'
    + '<div class="form-group" style="margin-bottom:14px;">'
    + '<label style="font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.08em;">Est. Delivery Date</label>'
    + '<input id="trk-delivery" type="date" value="' + esc(o.estimatedDelivery || '') + '" style="margin-top:4px;"/>'
    + '</div>'
    + '<div style="display:flex;gap:8px;">'
    + '<button class="btn btn-primary btn-sm" id="trk-save-btn">✓ Save &amp; Mark In Transit</button>'
    + '<button class="btn btn-ghost btn-sm" id="trk-cancel-btn">Cancel</button>'
    + '</div>';
}

function attachShipmentHandlers(o) {
  const editBtn = document.getElementById('edit-tracking-btn');
  if (editBtn) {
    editBtn.addEventListener('click', function(){
      document.getElementById('trk-form-wrap').style.display = 'block';
      editBtn.style.display = 'none';
    });
  }
  const cancelBtn = document.getElementById('trk-cancel-btn');
  if (cancelBtn) {
    cancelBtn.addEventListener('click', function(){
      document.getElementById('trk-form-wrap').style.display = 'none';
      if (editBtn) editBtn.style.display = '';
    });
  }
  const saveBtn = document.getElementById('trk-save-btn');
  if (saveBtn) {
    saveBtn.addEventListener('click', function(){
      if (!activeId) return;
      const awb = document.getElementById('trk-awb').value.trim();
      if (!awb) { alert('Please enter an AWB / tracking number.'); return; }
      const orders = readOrders();
      const ord = orders.find(function(x){ return x.orderId === activeId; });
      if (!ord) return;
      ord.courier           = document.getElementById('trk-courier').value;
      ord.airwayBillNo      = awb;
      ord.estimatedDelivery = document.getElementById('trk-delivery').value;
      if (ord.status === 'YET TO SHIP' || ord.status === 'CONFIRMED' || !ord.status) {
        ord.status = 'IN TRANSIT';
      }
      writeOrders(orders);
      allOrders = orders;
      document.getElementById('odp-status').value = ord.status;
      document.getElementById('shipment-section').innerHTML = buildShipmentSection(ord);
      attachShipmentHandlers(ord);
      render();
    });
  }
}

function closePanel() {
  activeId = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('odp-status').addEventListener('change', function(){
  if (!activeId) return;
  const orders = readOrders();
  const o = orders.find(function(x){ return x.orderId===activeId; });
  if (o) { o.status = this.value; writeOrders(orders); allOrders = orders; render(); }
});

document.getElementById('odp-close').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', closePanel);
document.addEventListener('click', function(e){
  if (!e.target.closest('.kebab-wrap')) {
    document.querySelectorAll('.kebab-menu.open').forEach(function(m){ m.classList.remove('open'); });
  }
});
document.getElementById('search').addEventListener('input', render);
document.getElementById('status-filter').addEventListener('change', render);
document.querySelectorAll('th[data-col]').forEach(function(th){
  th.addEventListener('click', function(){
    if (sortCol===th.dataset.col) sortDir*=-1;
    else { sortCol=th.dataset.col; sortDir=-1; }
    render();
  });
});

render();
</script>
</body>
</html>
