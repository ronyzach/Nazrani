<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<div id="app-chrome"></div>

<main id="main">
  <section class="page-head page-head-compact" aria-label="Breadcrumb">
    <div class="container" id="article-head"></div>
  </section>
  <article class="article-body" aria-labelledby="article-title">
    <div class="container-narrow" id="article-body"></div>
  </article>
  <section class="categories" aria-label="Continue">
    <div class="container">
      <div class="cat-grid" id="article-next"></div>
    </div>
  </section>
</main>

<div id="app-footer"></div>

<script src="assets/data.js"></script>
<script src="assets/data-service.js"></script>
<script src="assets/app.js"></script>
<script src="assets/tracker.js"></script>
<script>
(async function () {
  Nazrani.init({ active: 'journal', pageId: 'article' });
  const C = DATA.copy.pages.article;
  const esc = Nazrani.esc, tpl = Nazrani.tpl;
  const slug = new URLSearchParams(location.search).get('slug');
  const body = document.getElementById('article-body');

  if (!slug) {
    body.innerHTML = `<div style="padding:60px 0;text-align:center;">
      <h1 id="article-title">${esc(C.notFoundTitle)}</h1>
      <a href="journal.html" class="btn btn-ghost">${esc(DATA.copy.ui.backToJournal)}</a></div>`;
    return;
  }

  const article = await DataService.getArticle(slug);
  if (!article) {
    body.innerHTML = `<div style="padding:60px 0;text-align:center;">
      <h1 id="article-title">${esc(C.notFoundTitle)}</h1>
      <p style="color:var(--ink-soft);">${esc(C.notFoundBody)}</p>
      <a href="journal.html" class="btn btn-ghost">${esc(DATA.copy.ui.backToJournal)}</a></div>`;
    return;
  }

  document.title = article.title + ' · ' + DATA.brand.name + ' ' + DATA.brand.qualifier;
  Nazrani.setMeta('article');

  document.getElementById('article-head').innerHTML = `
    <div class="crumbs"><a href="index.html">Home</a> · <a href="journal.html">Journal</a> · ${esc(article.tag)}</div>`;

  body.innerHTML = `
    <div class="hero-img"><img src="${article.image}" alt="${esc(article.title)}" loading="eager"/></div>
    <div class="meta">
      <span class="tag-mono">${esc(article.tag)}</span>
      <span>${esc(article.date)}</span>
      <span>${esc(article.read)}</span>
    </div>
    <h1 id="article-title">${esc(article.title)}</h1>
    <div class="sub-title">${esc(article.subtitle || '')}</div>
    ${(article.body || []).map(p => '<p>' + esc(p) + '</p>').join('')}
    <div class="author">${esc(tpl(C.authorTemplate, { author: article.author, date: article.date }))}</div>
    <div style="margin-top:32px;"><a href="journal.html" class="btn btn-ghost">${esc(C.backLabel)}</a></div>`;

  const nextTiles = [
    { href: 'journal.html', name: 'Journal', desc: 'More from the field', cta: 'All articles' },
    { href: 'shop.html',    name: 'Shop',    desc: 'Single-origin produce', cta: 'Browse the range' },
    { href: 'origins.html', name: 'Origins', desc: 'Where every lot begins', cta: 'See the map' },
  ];
  document.getElementById('article-next').innerHTML = nextTiles.map((t, i) => `
    <a href="${t.href}" class="catcard" aria-label="${esc(t.name)} — ${esc(t.cta)}">
      <div class="meta">${String(i + 1).padStart(2, '0')} · ${esc(t.name).toUpperCase()}</div>
      <div class="body">
        <div class="name">${esc(t.name)}</div>
        <div class="desc">${esc(t.desc)}</div>
      </div>
      <div class="cta">${esc(t.cta)} <span class="arr">→</span></div>
    </a>`).join('');
})();
</script>
</body>
</html>
