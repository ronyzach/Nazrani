<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<div id="app-chrome"></div>

<main id="main">
  <section class="page-head" aria-labelledby="page-title">
    <div class="container" id="page-head"></div>
  </section>

  <section id="story" class="story" style="background:var(--paper)" aria-labelledby="story-title">
    <div class="container grid" id="story-grid"></div>
  </section>

  <section class="founder" style="background:var(--paper-cool)" aria-labelledby="founder-eyebrow">
    <div class="container" id="founder-body"></div>
  </section>

  <section class="story" id="partners" style="background:var(--paper)" aria-labelledby="partners-title">
    <div class="container" id="partners-body"></div>
  </section>

  <section class="categories" aria-labelledby="next-title">
    <div class="container">
      <div class="head" id="next-head"></div>
      <div class="cat-grid" id="next-grid"></div>
    </div>
  </section>
</main>

<div id="app-footer"></div>

<script src="assets/data.js"></script>
<script src="assets/data-service.js"></script>
<script src="assets/app.js"></script>
<script src="assets/tracker.js"></script>
<script>
(async function () {
  Nazrani.init({ active: 'about', pageId: 'about' });
  const A = DATA.copy.pages.about;
  const H = DATA.copy.pages.home;
  const esc = Nazrani.esc, pad2 = Nazrani.pad2;

  // -------- PAGE HEAD -----------------------------------------------------
  document.getElementById('page-head').innerHTML = `
    <div class="crumbs"><a href="index.html">Home</a> · ${esc(A.crumbs)}</div>
    <h1 id="page-title">${esc(A.titleA)}<span class="accent">${esc(A.titleB)}</span></h1>
    <p class="lede">${esc(A.lede)}</p>`;

  // -------- STORY (long form, about-specific) ----------------------------
  const S = A.story;
  const vignetteHTML = S.vignette ? `
    <aside class="vignette" style="margin:32px 0 8px;padding:28px 28px 24px;background:var(--paper-cool);border-left:2px solid var(--accent);">
      <div class="eyebrow" style="margin-bottom:10px;">${esc(S.vignette.eyebrow)}</div>
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:8px;">${esc(S.vignette.place)}</div>
      <h3 style="font-family:var(--serif);font-weight:500;font-size:24px;line-height:1.2;margin:0 0 14px;">${esc(S.vignette.title)}</h3>
      <p style="margin:0;">${esc(S.vignette.body)}</p>
    </aside>` : '';
  document.getElementById('story-grid').innerHTML = `
    <div>
      <div class="eyebrow">${esc(S.eyebrow)}</div>
      <h2 id="story-title">${esc(S.titleA)}<span class="serif-i">${esc(S.titleB)}</span></h2>
      ${S.subtitle ? `<p class="story-subtitle" style="font-family:var(--serif);font-style:italic;font-size:20px;line-height:1.4;color:var(--ink-muted);margin:-4px 0 18px;">${esc(S.subtitle)}</p>` : ''}
      <div class="timeline"><div class="t">${esc(S.timeline)}</div></div>
      <div class="tags">
        ${S.tags.map(t => `<span class="tag tag-${t.tone}">${esc(t.label)}</span>`).join('')}
      </div>
      <figure style="margin:32px 0 0;">
        <img src="assets/images/about-malabar-map.jpg?v=1" alt="Outline map of India highlighting Kerala and the Malabar Coast on the south-western shore" loading="lazy" style="width:100%;height:auto;display:block;border:1px solid var(--rule);"/>
        <figcaption style="font-family:var(--mono);font-size:10px;letter-spacing:0.14em;color:var(--ink-muted);text-transform:uppercase;margin-top:10px;">The Malabar Coast · today's Kerala</figcaption>
      </figure>
      <figure style="margin:24px 0 0;">
        <img src="assets/images/about-nazrani-family.jpg?v=1" alt="A multi-generational Nazrani family on the veranda of an ancestral tharavad in Kerala" loading="lazy" style="width:100%;height:auto;display:block;border:1px solid var(--rule);"/>
        <figcaption style="font-family:var(--mono);font-size:10px;letter-spacing:0.14em;color:var(--ink-muted);text-transform:uppercase;margin-top:10px;">A Nazrani household · Kerala</figcaption>
      </figure>
      <figure style="margin:24px 0 0;">
        <img src="assets/images/about-merchant-meeting.jpg?v=1" alt="A Nazrani merchant seated with a Jewish trader, an Arab trader, and a European merchant" loading="lazy" style="width:100%;height:auto;display:block;border:1px solid var(--rule);"/>
        <figcaption style="font-family:var(--mono);font-size:10px;letter-spacing:0.14em;color:var(--ink-muted);text-transform:uppercase;margin-top:10px;">The merchants of the Malabar coast</figcaption>
      </figure>
    </div>
    <div class="col-r">
      <p class="lede">${S.lede}</p>
      ${S.paragraphs.map(p => '<p>' + esc(p) + '</p>').join('')}
      ${vignetteHTML}
      ${(S.paragraphsAfter || []).map(p => '<p>' + esc(p) + '</p>').join('')}
    </div>`;

  // -------- FOUNDER -------------------------------------------------------
  document.getElementById('founder-body').innerHTML = `
    <div class="head"><div class="eyebrow" id="founder-eyebrow">${esc(H.founder.eyebrow)}</div></div>
    <blockquote>
      <div class="quote"><span class="accent">"</span>${H.founder.quote}<span class="accent">"</span></div>
    </blockquote>
    <div class="credit">
      <div class="avatar"><img src="${H.founder.avatar}" alt="${esc(H.founder.avatarAlt)}" loading="lazy"/></div>
      <div>
        <div class="name">${esc(H.founder.name)}</div>
        <div class="role">${esc(H.founder.role)}</div>
      </div>
    </div>`;

  // -------- PARTNERS ------------------------------------------------------
  const P = A.partners;
  document.getElementById('partners-body').innerHTML = `
    <div class="grid">
      <div>
        <div class="eyebrow">${esc(P.eyebrow)}</div>
        <h2 id="partners-title">${esc(P.titleA)}<span class="serif-i">${esc(P.titleB)}</span></h2>
      </div>
      <div class="col-r">
        <p class="lede">${esc(P.lede)}</p>
        ${P.list.map((pt, i) => `
          <div class="partner-card" style="border-top:1px solid var(--rule);padding:28px 0 8px;margin-top:24px;">
            <div class="meta" style="font-family:var(--mono);font-size:9px;letter-spacing:0.16em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:10px;">${pad2(i + 1)} · ${esc(pt.since)}</div>
            <h3 style="font-family:var(--serif);font-weight:500;font-size:28px;line-height:1.15;margin:0 0 4px;">${esc(pt.name)}</h3>
            <div style="color:var(--ink-soft);font-size:14px;margin-bottom:14px;">${esc(pt.location)}</div>
            <div class="tags" style="margin:0 0 16px;">
              ${pt.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}
            </div>
            <p>${esc(pt.body)}</p>
            <p style="margin-top:14px;"><a class="more" href="${esc(pt.website.href)}" target="_blank" rel="noopener">${esc(pt.website.label)}</a></p>
          </div>`).join('')}
      </div>
    </div>`;

  // -------- WHERE TO GO NEXT ---------------------------------------------
  document.getElementById('next-head').innerHTML = `
    <div>
      <div class="eyebrow">${esc(A.next.eyebrow)}</div>
      <h2 id="next-title">${esc(A.next.titleA)}<span class="serif-i">${esc(A.next.titleB)}</span></h2>
    </div>`;

  document.getElementById('next-grid').innerHTML = A.next.tiles.map((t, i) => `
    <a href="${t.href}" class="catcard" aria-label="${esc(t.name)} — ${esc(t.cta)}">
      <div class="meta">${pad2(i + 1)} · ${esc(t.name).toUpperCase()}</div>
      <div class="body">
        <div class="name">${esc(t.name)}</div>
        <div class="desc">${esc(t.desc).replace(/\n/g, '<br>')}</div>
      </div>
      <div class="cta">${esc(t.cta)} <span class="arr">→</span></div>
    </a>`).join('');
})();
</script>
</body>
</html>
