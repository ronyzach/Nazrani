<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Nazrani Heritage seal" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer double ring -->
  <circle cx="120" cy="120" r="113" stroke-width="1.4"/>
  <circle cx="120" cy="120" r="106" stroke-width="0.55"/>

  <!-- Top pepper sprig (between rings) -->
  <g stroke-width="1" fill="currentColor">
    <!-- left leaf -->
    <path d="M 102 30 C 90 26 86 18 96 12 C 108 14 110 22 102 30 Z" fill-opacity="0.8" stroke="currentColor" stroke-width="0.8"/>
    <!-- right leaf -->
    <path d="M 138 30 C 150 26 154 18 144 12 C 132 14 130 22 138 30 Z" fill-opacity="0.8" stroke="currentColor" stroke-width="0.8"/>
    <!-- centre stem -->
    <path d="M 120 12 L 120 30" fill="none" stroke-width="1"/>
    <!-- berries -->
    <circle cx="115" cy="22" r="1.9"/>
    <circle cx="125" cy="22" r="1.9"/>
    <circle cx="120" cy="29" r="1.9"/>
  </g>

  <!-- Bottom pepper sprig (mirrored) -->
  <g stroke-width="1" fill="currentColor" transform="rotate(180 120 120)">
    <path d="M 102 30 C 90 26 86 18 96 12 C 108 14 110 22 102 30 Z" fill-opacity="0.8" stroke="currentColor" stroke-width="0.8"/>
    <path d="M 138 30 C 150 26 154 18 144 12 C 132 14 130 22 138 30 Z" fill-opacity="0.8" stroke="currentColor" stroke-width="0.8"/>
    <path d="M 120 12 L 120 30" fill="none" stroke-width="1"/>
    <circle cx="115" cy="22" r="1.9"/>
    <circle cx="125" cy="22" r="1.9"/>
    <circle cx="120" cy="29" r="1.9"/>
  </g>

  <!-- Side flourishes (small berries on east/west between rings) -->
  <g fill="currentColor">
    <circle cx="14" cy="120" r="1.6"/>
    <circle cx="22" cy="120" r="1.2"/>
    <circle cx="226" cy="120" r="1.6"/>
    <circle cx="218" cy="120" r="1.2"/>
  </g>

  <!-- Centre: Saint Thomas–style budded cross -->
  <g stroke-width="1.5" fill="currentColor">
    <!-- vertical arm -->
    <path d="M 120 60 L 120 102" fill="none"/>
    <!-- horizontal arm -->
    <path d="M 99 81 L 141 81" fill="none"/>
    <!-- floriated buds at four ends -->
    <circle cx="120" cy="58" r="2.4"/>
    <circle cx="120" cy="104" r="2.4"/>
    <circle cx="97"  cy="81" r="2.4"/>
    <circle cx="143" cy="81" r="2.4"/>
    <!-- small buds flanking each tip (three-bud floriated form) -->
    <circle cx="116" cy="61" r="1.3"/>
    <circle cx="124" cy="61" r="1.3"/>
    <circle cx="116" cy="101" r="1.3"/>
    <circle cx="124" cy="101" r="1.3"/>
    <circle cx="100" cy="77" r="1.3"/>
    <circle cx="100" cy="85" r="1.3"/>
    <circle cx="140" cy="77" r="1.3"/>
    <circle cx="140" cy="85" r="1.3"/>
  </g>

  <!-- Wordmark — NAZRANI -->
  <text x="120" y="135" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="500" letter-spacing="3.6" text-anchor="middle" fill="currentColor" stroke="none">NAZRANI</text>

  <!-- Wordmark — HERITAGE -->
  <text x="120" y="155" font-family="'Inter', sans-serif" font-size="8.5" font-weight="500" letter-spacing="4.2" text-anchor="middle" fill="currentColor" fill-opacity="0.78" stroke="none">H E R I T A G E</text>

  <!-- Hairline divider -->
  <line x1="98" y1="167" x2="142" y2="167" stroke-width="0.6"/>

  <!-- Heritage tagline -->
  <text x="120" y="183" font-family="'Inter', sans-serif" font-size="6.3" font-weight="500" letter-spacing="2" text-anchor="middle" fill="currentColor" fill-opacity="0.6" stroke="none">EST · KOTTAYAM · KERALA</text>
</svg>
